<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클립 보관함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --surface3: #242433;
  --border: #2a2a3d;
  --border2: #353550;
  --text: #eeeef5;
  --text2: #9090b0;
  --text3: #55556a;
  --accent: #7c6fff;
  --accent2: #5a4fcc;
  --accent-glow: rgba(124,111,255,0.2);
  --red: #ff6b6b;
  --green: #4ecf8a;
  --radius: 14px;
}
[data-theme="light"] {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f5;
  --surface3: #e8e8ef;
  --border: #e2e2ea;
  --border2: #d0d0dc;
  --text: #1a1a2e;
  --text2: #4a4a6a;
  --text3: #9090aa;
  --accent: #5a4fcc;
  --accent2: #3d35aa;
  --accent-glow: rgba(90,79,204,0.15);
  --red: #e03030;
  --green: #1a9e6a;
}
[data-theme="light"] .nav, [data-theme="light"] .topbar { background: rgba(255,255,255,0.92); }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; }

/* ── LAYOUT ── */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 0;
  overflow-y: auto;
}
.sidebar-logo {
  font-size: 17px; font-weight: 700;
  color: var(--text); padding: 0 20px 20px;
  letter-spacing: -0.3px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-logo span { color: var(--accent); }
.sidebar-section { padding: 6px 12px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; }
.cat-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; cursor: pointer;
  font-size: 14px; color: var(--text2);
  border-radius: 0; transition: all .15s;
  position: relative;
}
.cat-item:hover { background: var(--surface2); color: var(--text); }
.cat-item.active { background: var(--surface2); color: var(--text); }
.cat-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  height: 60%; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.cat-icon { font-size: 16px; width: 20px; text-align: center; }
.cat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cat-count { font-size: 11px; color: var(--text3); background: var(--surface3); padding: 1px 7px; border-radius: 20px; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.page-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 12px;
  width: 220px; transition: border-color .2s;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box input { background: none; border: none; outline: none; font-size: 13px; color: var(--text); font-family: inherit; width: 100%; }
.search-box input::placeholder { color: var(--text3); }
.add-btn-main {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px;
  background: var(--accent); color: #fff;
  border: none; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 0 16px var(--accent-glow);
  transition: all .15s;
}
.add-btn-main:hover { background: var(--accent2); }

/* GRID */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

/* CARD */
.clip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.clip-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.thumb-wrap { position: relative; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.platform-badge {
  position: absolute; top: 8px; left: 8px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
}
.platform-badge.yt { background: #ff0000; color: #fff; }
.platform-badge.ig { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color: #fff; }
.card-body { padding: 10px 12px 12px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.card-cat { font-size: 11px; color: var(--accent); background: var(--accent-glow); padding: 1px 7px; border-radius: 20px; }
.card-actions {
  position: absolute; top: 8px; right: 8px;
  display: none; gap: 4px;
}
.clip-card:hover .card-actions { display: flex; }
.card-action-btn {
  width: 28px; height: 28px; border-radius: 8px;
  border: none; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); transition: all .15s;
}
.btn-del { background: rgba(255,107,107,0.85); color: #fff; }
.btn-del:hover { background: var(--red); }
.btn-move { background: rgba(30,30,40,0.85); color: var(--text2); }
.btn-move:hover { background: var(--surface3); color: var(--text); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: var(--text3); gap: 12px; }
.empty-state .emoji { font-size: 48px; }
.empty-state p { font-size: 14px; }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 28px;
  width: 440px; max-width: 95vw;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  animation: modal-in .25s cubic-bezier(0.34,1.3,0.64,1);
}
@keyframes modal-in { from { opacity:0; transform: scale(0.94) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 12px;
  border-radius: 10px; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; }
.url-preview { margin-top: 8px; padding: 10px 12px; border-radius: 10px; background: var(--surface3); font-size: 12px; color: var(--text2); display: none; }
.url-preview.show { display: block; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.modal-btns button { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; border: none; }
.btn-cancel { background: var(--surface3); color: var(--text2); }
.btn-cancel:hover { background: var(--surface2); }
.btn-save { background: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent-glow); }
.btn-save:hover { background: var(--accent2); }

/* add cat modal */
.cat-modal { width: 320px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── 잠금화면 ── */
.lockscreen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
}
.lockscreen.hidden { display: none; }
.lock-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.lock-sub { font-size: 13px; color: var(--text3); margin-top: -12px; }
.pin-dots { display: flex; gap: 14px; margin: 4px 0; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: all .2s; }
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: var(--red); border-color: var(--red); animation: shake .3s; }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 220px; }
.pin-key {
  height: 58px; border-radius: 14px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text); font-size: 20px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.pin-key:hover { background: var(--surface3); }
.pin-key:active { transform: scale(0.95); }
.pin-key.del { font-size: 16px; color: var(--text3); }
.pin-key.empty { background: transparent; border-color: transparent; cursor: default; }
.pin-error-msg { font-size: 12px; color: var(--red); height: 16px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ── VPN 설정 모달 ── */
.vpn-modal { width: 360px; }
</style>
</head>
<body>

<!-- 잠금화면 -->
<div class="lockscreen" id="lockscreen">
  <div style="font-size:36px;">🔒</div>
  <div class="lock-title">클립보관함</div>
  <div class="lock-sub">6자리 비밀번호를 입력하세요</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
    <div class="pin-dot" id="dot-4"></div>
    <div class="pin-dot" id="dot-5"></div>
  </div>
  <div class="pin-error-msg" id="pin-error"></div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput('0')">0</button>
    <button class="pin-key del" onclick="pinDelete()">⌫</button>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-top:8px;" id="pin-setup-msg"></div>
</div>

<!-- VPN 설정 모달 -->
<div class="overlay" id="vpn-overlay" onclick="closeVpnModal(event)">
  <div class="modal vpn-modal">
    <div class="modal-title">🔐 VPN 설정</div>
    <div class="field">
      <label>서버 주소 (IP)</label>
      <input type="text" id="vpn-host" placeholder="예: 192.168.1.1">
    </div>
    <div class="field">
      <label>포트</label>
      <input type="text" id="vpn-port" placeholder="예: 1194">
    </div>
    <div class="field">
      <label>사용자명 (선택)</label>
      <input type="text" id="vpn-user" placeholder="username">
    </div>
    <div class="field">
      <label>비밀번호 (선택)</label>
      <input type="password" id="vpn-pass" placeholder="password">
    </div>
    <div class="field">
      <label>메모</label>
      <input type="text" id="vpn-memo" placeholder="예: 집 VPN, 회사 VPN...">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeVpnModal()">취소</button>
      <button class="btn-save" onclick="saveVpnInfo()">저장</button>
    </div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">🎬 <span>클립</span>보관함</div>
    <div class="sidebar-section">카테고리</div>
    <div id="cat-list"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);margin-top:auto;">
    <div style="font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;">AI API 키</div>
    <div style="display:flex;gap:6px;">
      <input type="password" id="api-key-input" placeholder="키 입력..." style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;outline:none;" onkeydown="if(event.key==='Enter')saveApiKey()">
      <button onclick="saveApiKey()" style="padding:6px 10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;">저장</button>
    </div>
    <div id="api-key-status" style="font-size:11px;color:var(--text3);margin-top:4px;"></div>
  </div>
</aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;flex:1;">
        <div class="page-title" id="page-title">전체</div>
        <button id="hidden-btn" onclick="toggleHiddenMode()" title="히든 모드" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;">
          <span>🔒</span>
          <span id="hidden-label">히든</span>
        </button>
        <button id="vpn-btn" onclick="openVpnModal()" title="VPN 동기화" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;">
          <span id="vpn-dot" style="width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;"></span>
          <span id="vpn-label">VPN</span>
        </button>
        <div id="kr-clock" style="display:flex;flex-direction:column;line-height:1.3;">
          <div id="kr-time" style="font-size:13px;font-weight:700;letter-spacing:1px;font-family:monospace;color:var(--accent);">00:00:00</div>
          <div id="kr-date" style="font-size:10px;color:var(--text3);">날짜</div>
        </div>
      </div>
      <div class="search-box">
        <span style="color:var(--text3);font-size:14px;">🔍</span>
        <input type="text" placeholder="검색..." id="search-input" oninput="renderCards()">
      </div>
      <button id="theme-btn" onclick="toggleTheme()" style="width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">🌙</button>
      <button class="add-btn-main" onclick="openAddModal()">＋ 추가</button>
    </div>
    <div class="content">
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<!-- ADD CLIP MODAL -->
<div class="overlay" id="add-overlay" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-title">클립 추가</div>
    <div class="field">
      <label>유튜브 / 인스타 링크</label>
      <div style="display:flex;gap:8px;">
        <input type="url" id="clip-url" placeholder="https://youtube.com/... 또는 https://instagram.com/..." oninput="previewUrl()" style="flex:1;">
        <button onclick="aiClassify()" id="ai-classify-btn" style="padding:0 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s;">✨ AI</button>
      </div>
      <div class="url-preview" id="url-preview"></div>
    </div>
    <div class="field">
      <label>제목</label>
      <input type="text" id="clip-title" placeholder="AI 버튼을 누르면 자동 입력돼요">
    </div>
    <div class="field">
      <label>카테고리</label>
      <select id="clip-cat"></select>
    </div>
    <div class="field">
      <label>메모 (선택)</label>
      <textarea id="clip-memo" placeholder="간단한 메모..."></textarea>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;" onclick="document.getElementById('clip-hidden').checked=!document.getElementById('clip-hidden').checked">
      <input type="checkbox" id="clip-hidden" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);">🔒 히든 클립</div>
        <div style="font-size:11px;color:var(--text3);">비밀번호 입력 시에만 보여요</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn-save" onclick="saveClip()">저장</button>
    </div>
  </div>
</div>

<!-- MOVE MODAL -->
<div class="overlay" id="move-overlay" onclick="closeMoveModal(event)">
  <div class="modal cat-modal">
    <div class="modal-title">카테고리 이동</div>
    <div id="move-cat-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
    <button class="btn-cancel" style="width:100%;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:var(--surface3);color:var(--text2);" onclick="closeMoveModal()">취소</button>
  </div>
</div>

<script>
var clips = JSON.parse(localStorage.getItem('clips') || '[]');
var currentCat = 'all';
var movingClipId = null;

// 카테고리 항상 고정 11개
var cats = [
  {id:'cat_1', name:'스포츠', emoji:'⚾'},
  {id:'cat_2', name:'음악', emoji:'🎵'},
  {id:'cat_3', name:'요리', emoji:'🍳'},
  {id:'cat_4', name:'여행', emoji:'✈️'},
  {id:'cat_5', name:'드라마/영화', emoji:'🎬'},
  {id:'cat_6', name:'패션', emoji:'👗'},
  {id:'cat_7', name:'게임', emoji:'🎮'},
  {id:'cat_8', name:'뷰티', emoji:'💄'},
  {id:'cat_9', name:'일상/브이로그', emoji:'📱'},
  {id:'cat_10', name:'정보/교육', emoji:'📚'},
  {id:'cat_11', name:'기타', emoji:'📌'},
];

function saveClips(){ localStorage.setItem('clips', JSON.stringify(clips)); }

function getYtId(url){
  var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([^&?\/\s]{11})/);
  return m ? m[1] : null;
}
function getIgId(url){
  return /instagram\.com\/(p|reel|reels)\//.test(url);
}
function getPlatform(url){
  if(/youtube\.com|youtu\.be/.test(url)) return 'yt';
  if(/instagram\.com/.test(url)) return 'ig';
  return null;
}
function getThumbnail(url){
  var ytId = getYtId(url);
  if(ytId) return 'https://img.youtube.com/vi/'+ytId+'/mqdefault.jpg';
  if(getIgId(url)) return null;
  return null;
}

function previewUrl(){
  var url = document.getElementById('clip-url').value.trim();
  var preview = document.getElementById('url-preview');
  var p = getPlatform(url);
  if(!p){ preview.className='url-preview'; return; }
  var ytId = getYtId(url);
  var txt = p === 'yt' ? '✅ 유튜브 영상' + (ytId ? ' (ID: '+ytId+')' : '') : '✅ 인스타그램 링크';
  preview.textContent = txt;
  preview.className = 'url-preview show';
}

function openAddModal(){
  document.getElementById('clip-url').value='';
  document.getElementById('clip-title').value='';
  document.getElementById('clip-memo').value='';
  document.getElementById('url-preview').className='url-preview';
  document.getElementById('clip-hidden').checked=false;
  var sel = document.getElementById('clip-cat');
  sel.innerHTML = cats.map(function(c){ return '<option value="'+c.id+'"'+(currentCat===c.id?' selected':'')+'>'+c.emoji+' '+c.name+'</option>'; }).join('');
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('clip-url').focus(); }, 100);
}
function closeAddModal(e){
  if(!e || e.target===document.getElementById('add-overlay'))
    document.getElementById('add-overlay').classList.remove('open');
}
function saveClip(){
  var url = document.getElementById('clip-url').value.trim();
  var title = document.getElementById('clip-title').value.trim();
  var catId = document.getElementById('clip-cat').value;
  var memo = document.getElementById('clip-memo').value.trim();
  var hidden = document.getElementById('clip-hidden').checked;
  if(!url){ alert('링크를 입력해주세요!'); return; }
  var p = getPlatform(url);
  if(!p){ alert('유튜브 또는 인스타그램 링크만 가능해요!'); return; }
  if(!title){
    var ytId = getYtId(url);
    title = p==='yt' ? (ytId ? '유튜브 영상 ('+ytId.slice(0,6)+'...)' : '유튜브 영상') : '인스타그램 영상';
  }
  var clip = { id: Date.now(), url: url, title: title, catId: catId, memo: memo, hidden: hidden, platform: p, thumb: getThumbnail(url), createdAt: new Date().toISOString() };
  clips.unshift(clip);
  saveClips();
  document.getElementById('add-overlay').classList.remove('open');
  renderAll();
}






// ── AI 자동 분류 ──
var clipApiKey = localStorage.getItem('clip_api_key') || '';
if(clipApiKey){ var _ki = document.getElementById('api-key-input'); if(_ki) _ki.placeholder = '키 저장됨 ✅'; }
function updateApiKeyStatus(){
  var el = document.getElementById('api-key-status');
  if(!el) return;
  el.textContent = clipApiKey ? '✅ 키 저장됨' : '키 없으면 직접 선택해요';
}
function saveApiKey(){
  var k = document.getElementById('api-key-input').value.trim();
  if(!k) return;
  clipApiKey = k;
  localStorage.setItem('clip_api_key', k);
  document.getElementById('api-key-input').value = '';
  updateApiKeyStatus();
updateVpnBtn();
initLock();
}

async function aiClassify(){
  var url = document.getElementById('clip-url').value.trim();
  if(!url){ alert('링크를 먼저 입력해주세요!'); return; }
  if(!clipApiKey){ alert('사이드바에 API 키를 먼저 입력해주세요!'); return; }

  var btn = document.getElementById('ai-classify-btn');
  btn.textContent = '...'; btn.disabled = true;

  var catList = cats.map(function(c){ return c.id+': '+c.name; }).join(', ');
  var prompt = '다음 URL을 보고 영상 제목(추측)과 카테고리를 JSON으로만 답해줘. URL: '+url+' 카테고리 목록: '+catList+' 형식: {"title":"제목","catId":"cat_번호"} JSON만 출력. 제목은 URL에서 유추하거나 플랫폼명+내용으로 짧게.';

  try {
    var res = await fetch('https://aiprimetech.io/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': clipApiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:150,
        messages:[{role:'user', content:prompt}]
      })
    });
    var data = await res.json();
    if(data.error) throw new Error(data.error.message);
    var parsed = JSON.parse(data.content[0].text.trim().replace(/```json|```/g,'').trim());
    if(parsed.title) document.getElementById('clip-title').value = parsed.title;
    if(parsed.catId){
      var sel = document.getElementById('clip-cat');
      sel.value = parsed.catId;
    }
    document.getElementById('url-preview').textContent = '✨ AI 분류 완료! 확인 후 저장하세요';
    document.getElementById('url-preview').className = 'url-preview show';
  } catch(e) {
    alert('AI 오류: '+e.message);
  } finally {
    btn.textContent = '✨ AI'; btn.disabled = false;
  }
}

function openMoveModal(clipId){
  movingClipId = clipId;
  var clip = clips.find(function(c){ return c.id === clipId; });
  var list = document.getElementById('move-cat-list');
  list.innerHTML = cats.filter(function(c){ return c.id !== clip.catId; }).map(function(c){
    return '<button onclick="moveClip(\''+c.id+'\')" style="padding:10px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;" onmouseover="this.style.borderColor=\'var(--accent)\'" onmouseout="this.style.borderColor=\'var(--border2)\'">'+c.emoji+' '+c.name+'</button>';
  }).join('');
  document.getElementById('move-overlay').classList.add('open');
}
function closeMoveModal(e){
  if(!e || e.target===document.getElementById('move-overlay'))
    document.getElementById('move-overlay').classList.remove('open');
}
function moveClip(catId){
  var idx = clips.findIndex(function(c){ return c.id === movingClipId; });
  if(idx >= 0){ clips[idx].catId = catId; saveClips(); }
  document.getElementById('move-overlay').classList.remove('open');
  renderAll();
}
function deleteClip(id){
  clips = clips.filter(function(c){ return c.id !== id; });
  saveClips(); renderCards();
}

function openClip(url){ window.open(url, '_blank'); }

function renderSidebar(){
  var list = document.getElementById('cat-list');
  var allCount = clips.filter(function(c){ return hiddenMode ? c.hidden : !c.hidden; }).length;
  var allActive = currentCat === 'all';
  var html = '<div class="cat-item'+(allActive?' active':'')+'" onclick="selectCat(\'all\')">'
    +'<span class="cat-icon">🗂</span><span class="cat-name">전체</span>'
    +'<span class="cat-count">'+allCount+'</span></div>';
  cats.forEach(function(c){
    var cnt = clips.filter(function(cl){ return cl.catId===c.id && (hiddenMode ? cl.hidden : !cl.hidden); }).length;
    var active = currentCat===c.id;
    html += '<div class="cat-item'+(active?' active':'')+'" onclick="selectCat(\''+c.id+'\')">'
      +'<span class="cat-icon">'+c.emoji+'</span>'
      +'<span class="cat-name">'+c.name+'</span>'
      +'<span class="cat-count">'+cnt+'</span>'
      +'</div>';
  });
  list.innerHTML = html;
}

function renderCards(){
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  var filtered = clips.filter(function(c){
    var catOk = currentCat==='all' || c.catId===currentCat;
    var searchOk = !q || c.title.toLowerCase().includes(q) || (c.memo||'').toLowerCase().includes(q);
    var hiddenOk = hiddenMode ? c.hidden : !c.hidden;
    return catOk && searchOk && hiddenOk;
  });
  var grid = document.getElementById('grid');
  if(filtered.length===0){
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="emoji">🎬</div><p>클립이 없어요. 추가해보세요!</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(function(c){
    var thumbHtml = c.thumb
      ? '<img src="'+c.thumb+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
        +'<div class="thumb-placeholder" style="display:none">'+(c.platform==='yt'?'▶️':'📸')+'</div>'
      : '<div class="thumb-placeholder">'+(c.platform==='yt'?'▶️':'📸')+'</div>';
    var cat = cats.find(function(ct){ return ct.id===c.catId; });
    var badge = c.platform==='yt' ? '<span class="platform-badge yt">YT</span>' : '<span class="platform-badge ig">IG</span>';
    return '<div class="clip-card" onclick="openClip(\''+c.url+'\')">'
      +'<div class="thumb-wrap">'+thumbHtml+badge
      +'<div class="card-actions" onclick="event.stopPropagation()">'
      +'<button class="card-action-btn btn-move" onclick="openMoveModal('+c.id+')" title="이동">↗</button>'
      +'<button class="card-action-btn btn-del" onclick="deleteClip('+c.id+')" title="삭제">✕</button>'
      +'</div></div>'
      +'<div class="card-body">'
      +'<div class="card-title">'+c.title+'</div>'
      +'<div class="card-meta">'+(cat?'<span class="card-cat">'+cat.emoji+' '+cat.name+'</span>':'')
      +(c.memo?'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+c.memo+'</span>':'')
      +'</div></div></div>';
  }).join('');
}

function selectCat(id){
  currentCat = id;
  var cat = cats.find(function(c){ return c.id===id; });
  document.getElementById('page-title').textContent = id==='all' ? '전체' : (cat ? cat.emoji+' '+cat.name : '전체');
  renderAll();
}

function renderAll(){ renderSidebar(); renderCards(); }

// 키보드 단축키
document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(function(o){ o.classList.remove('open'); });
  }
});

renderAll();

// ── 잠금화면 ──
var PIN_KEY = 'clips_pin';
var pinBuffer = '';
var pinMode = localStorage.getItem(PIN_KEY) ? 'unlock' : 'setup'; // setup or unlock

function initLock(){
  var msg = document.getElementById('pin-setup-msg');
  if(pinMode === 'setup') msg.textContent = '처음 입력한 6자리가 비밀번호로 설정돼요';
  else msg.textContent = '';
}

function pinInput(n){
  if(pinBuffer.length >= 6) return;
  pinBuffer += n;
  updateDots();
  if(pinBuffer.length === 6) setTimeout(checkPin, 120);
}

function pinDelete(){
  pinBuffer = pinBuffer.slice(0,-1);
  updateDots();
}

function updateDots(){
  for(var i=0;i<6;i++){
    var d = document.getElementById('dot-'+i);
    d.classList.toggle('filled', i < pinBuffer.length);
    d.classList.remove('error');
  }
  document.getElementById('pin-error').textContent = '';
}

function checkPin(){
  var saved = localStorage.getItem(PIN_KEY);
  if(pinMode === 'setup'){
    localStorage.setItem(PIN_KEY, pinBuffer);
    document.getElementById('lockscreen').classList.add('hidden');
  } else {
    if(pinBuffer === saved){
      document.getElementById('lockscreen').classList.add('hidden');
    } else {
      for(var i=0;i<6;i++) document.getElementById('dot-'+i).classList.add('error');
      document.getElementById('pin-error').textContent = '비밀번호가 틀렸어요';
      setTimeout(function(){ pinBuffer=''; updateDots(); }, 600);
      return;
    }
  }
  pinBuffer = '';
}

// ── 히든 모드 ──
var hiddenMode = false;

function toggleHiddenMode(){
  if(!hiddenMode){
    // 비번 확인 후 히든 모드 진입
    var input = prompt('비밀번호 6자리를 입력하세요');
    if(!input) return;
    var saved = localStorage.getItem(PIN_KEY);
    if(input !== saved){ alert('비밀번호가 틀렸어요!'); return; }
    hiddenMode = true;
    var btn = document.getElementById('hidden-btn');
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
    document.getElementById('hidden-label').textContent = '히든 ON';
  } else {
    hiddenMode = false;
    var btn = document.getElementById('hidden-btn');
    btn.style.borderColor = 'var(--border2)';
    btn.style.color = 'var(--text3)';
    document.getElementById('hidden-label').textContent = '히든';
  }
  renderAll();
}

// ── VPN 설정 ──
var vpnInfo = JSON.parse(localStorage.getItem('vpn_info') || '{}');
var vpnOn = false;

function openVpnModal(){
  document.getElementById('vpn-host').value = vpnInfo.host || '';
  document.getElementById('vpn-port').value = vpnInfo.port || '';
  document.getElementById('vpn-user').value = vpnInfo.user || '';
  document.getElementById('vpn-pass').value = vpnInfo.pass || '';
  document.getElementById('vpn-memo').value = vpnInfo.memo || '';
  document.getElementById('vpn-overlay').classList.add('open');
}
function closeVpnModal(e){
  if(!e || e.target===document.getElementById('vpn-overlay'))
    document.getElementById('vpn-overlay').classList.remove('open');
}
function saveVpnInfo(){
  vpnInfo = {
    host: document.getElementById('vpn-host').value.trim(),
    port: document.getElementById('vpn-port').value.trim(),
    user: document.getElementById('vpn-user').value.trim(),
    pass: document.getElementById('vpn-pass').value.trim(),
    memo: document.getElementById('vpn-memo').value.trim(),
  };
  localStorage.setItem('vpn_info', JSON.stringify(vpnInfo));
  document.getElementById('vpn-overlay').classList.remove('open');
  updateVpnBtn();
}
function updateVpnBtn(){
  var dot = document.getElementById('vpn-dot');
  var label = document.getElementById('vpn-label');
  if(vpnInfo.host){
    dot.style.background = '#f5a623';
    label.textContent = vpnInfo.memo || 'VPN 설정됨';
    document.getElementById('vpn-btn').style.color = '#f5a623';
    document.getElementById('vpn-btn').style.borderColor = '#f5a623';
  }
}

// VPN 토글 (UI only - 나중에 기능 연결)
function toggleVPN(){
  vpnOn = !vpnOn;
  var btn = document.getElementById('vpn-btn');
  var dot = document.getElementById('vpn-dot');
  var label = document.getElementById('vpn-label');
  if(vpnOn){
    dot.style.background = '#4ecf8a';
    btn.style.borderColor = '#4ecf8a';
    btn.style.color = '#4ecf8a';
    label.textContent = 'VPN 연결됨';
  } else {
    dot.style.background = 'var(--text3)';
    btn.style.borderColor = 'var(--border2)';
    btn.style.color = 'var(--text3)';
    label.textContent = 'VPN';
  }
}

// 한국 시간 시계
function updateKRClock(){
  var now = new Date();
  var kr = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  var h = String(kr.getHours()).padStart(2,'0');
  var m = String(kr.getMinutes()).padStart(2,'0');
  var s = String(kr.getSeconds()).padStart(2,'0');
  document.getElementById('kr-time').textContent = h+':'+m+':'+s;
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('kr-date').textContent = '🇰🇷 '+(kr.getMonth()+1)+'월 '+kr.getDate()+'일 ('+days[kr.getDay()]+')';
}
updateKRClock();
setInterval(updateKRClock, 1000);
updateApiKeyStatus();
updateVpnBtn();
initLock();

var savedTheme = localStorage.getItem('clips_theme') || 'dark';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t==='dark' ? '🌙' : '☀️';
  localStorage.setItem('clips_theme', t);
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(cur==='dark' ? 'light' : 'dark');
}
applyTheme(savedTheme);
